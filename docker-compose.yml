name: sarkari-result

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: sarkari-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - admin
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - sarkari-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "nginx -t >/dev/null 2>&1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sarkari-backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - COSMOS_CONNECTION_STRING=${COSMOS_CONNECTION_STRING}
      - MONGODB_URI=${MONGODB_URI:-}
      - COSMOS_DATABASE_NAME=${COSMOS_DATABASE_NAME:-sarkari_db}
      - LEGACY_MONGO_REQUIRED=${LEGACY_MONGO_REQUIRED:-false}
      - POSTGRES_PRISMA_URL=${POSTGRES_PRISMA_URL:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - SENTRY_DSN=${SENTRY_DSN}
      - FRONTEND_URL=${FRONTEND_URL:-https://sarkariexams.me}
      - FRONTEND_REVALIDATE_URL=${FRONTEND_REVALIDATE_URL:-http://frontend:3000/api/revalidate}
      - FRONTEND_REVALIDATE_TOKEN=${FRONTEND_REVALIDATE_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://sarkariexams.me,https://www.sarkariexams.me}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - READINESS_CACHE_TTL_MS=${READINESS_CACHE_TTL_MS:-3000}
      - POSTGRES_HEALTH_TIMEOUT_MS=${POSTGRES_HEALTH_TIMEOUT_MS:-1500}
    expose:
      - "4000"
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - sarkari-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:4000/api/readyz',(res)=>{res.resume();process.exit(res.statusCode===200?0:1);});req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin Console (Next.js)
  admin:
    build:
      context: ./admin-next
      dockerfile: Dockerfile
    container_name: sarkari-admin
    expose:
      - "3001"
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - sarkari-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3001/admin',(res)=>{res.resume();process.exit(res.statusCode>=200&&res.statusCode<400?0:1);});req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js runtime)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
        - NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
    container_name: sarkari-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
      - INTERNAL_API_BASE_URL=http://backend:4000/api
      - NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
      - REVALIDATE_TOKEN=${FRONTEND_REVALIDATE_TOKEN:-}
      - CONTENT_CACHE_REVALIDATE_SECONDS=${CONTENT_CACHE_REVALIDATE_SECONDS:-300}
    expose:
      - "3000"
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - sarkari-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/',(res)=>{res.resume();process.exit(res.statusCode>=200&&res.statusCode<400?0:1);});req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Datadog Agent for Infrastructure Monitoring
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    container_name: sarkari-datadog
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_HOSTNAME=sarkariexams-server
      - DD_TAGS=env:production,service:sarkari-result
      # Docker monitoring
      - DD_DOCKER_LABELS_AS_TAGS=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      # APM for tracing
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      # Process monitoring
      - DD_PROCESS_AGENT_ENABLED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - sarkari-network
    restart: unless-stopped

networks:
  sarkari-network:
    driver: bridge

volumes:
  nginx-logs:
