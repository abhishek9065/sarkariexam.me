# Docker Compose override for faster local image builds.
# Production deploys use prebuilt registry images via docker-compose.production.yml.
# Use locally with: docker compose -f docker-compose.yml -f docker-compose.fast.yml build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
        - NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
        - NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
      cache_from:
        - sarkari-result-frontend:latest
      cache_to:
        - type=inline
    environment:
      # Optimize for faster builds
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - GENERATE_SOURCEMAP=false
      - DISABLE_ESLINT_PLUGIN=true
      # Production API URLs
      - NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
      - NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
  
  backend:
    build:
      cache_from:
        - sarkari-result-backend:latest
      cache_to:
        - type=inline
  
  admin:
    build:
      cache_from:
        - sarkari-result-admin:latest
      cache_to:
        - type=inline
  
  nginx:
    build:
      cache_from:
        - sarkari-result-nginx:latest
      cache_to:
        - type=inline
