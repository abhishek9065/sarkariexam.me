name: "CodeQL Config"

# Scan only production application code to reduce false positives from tests/fixtures.
paths:
  - backend/src
  - frontend/app
  - frontend/components
  - frontend/hooks
  - frontend/lib
  - admin-next/app
  - admin-next/components
  - admin-next/lib

paths-ignore:
  - backend/src/tests
  - backend/tests
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/*.d.ts"

queries:
  - uses: security-extended
