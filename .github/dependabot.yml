version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
    groups:
      backend-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend-v2
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
    groups:
      frontend-v2-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
