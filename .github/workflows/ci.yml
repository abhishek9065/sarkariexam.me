name: CI

on:
  workflow_call:
  pull_request:

jobs:
  backend:
    name: Backend Build + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled OpenAPI spec is in sync
        working-directory: .
        run: cmp openapi.json backend/openapi.json

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm run test:ci

  frontend:
    name: Public Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  admin:
    name: Admin App Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint admin app
        run: npm run lint

      - name: Build admin app
        run: npm run build
