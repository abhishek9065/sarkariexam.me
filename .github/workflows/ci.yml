name: Main CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Ensure generated artifacts are not tracked
        run: |
          set -euo pipefail

          tracked_next="$(git ls-files | grep -E '^(frontend|admin-next)/\\.next/' || true)"
          if [[ -n "${tracked_next}" ]]; then
            echo "::error::Generated Next.js .next artifacts are tracked in git. Remove them from version control."
            echo "${tracked_next}"
            exit 1
          fi

          tracked_copilot="$(git ls-files | grep -E '^\\.copilot-artifacts/' || true)"
          if [[ -n "${tracked_copilot}" ]]; then
            echo "::error::Copilot artifact files are tracked in git. Remove .copilot-artifacts from version control."
            echo "${tracked_copilot}"
            exit 1
          fi

  shell-safety:
    name: Shell Safety Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate shell syntax
        run: |
          set -euo pipefail
          bash -n scripts/deploy-common.sh
          bash -n scripts/deploy-live.sh
          bash -n scripts/deploy-via-ssh.sh
          bash -n scripts/deploy-fast.sh
          bash -n scripts/deploy-pull-images.sh
          bash -n scripts/deploy-prod.sh
          bash -n scripts/verify-deployment.sh
          bash -n scripts/rollback-last.sh

      - name: Lint critical deploy scripts
        run: |
          set -euo pipefail
          shellcheck --severity=error \
            scripts/deploy-common.sh \
            scripts/deploy-live.sh \
            scripts/deploy-via-ssh.sh \
            scripts/deploy-fast.sh \
            scripts/deploy-pull-images.sh \
            scripts/deploy-prod.sh \
            scripts/verify-deployment.sh \
            scripts/rollback-last.sh

  deploy-doc-consistency:
    name: Deploy Docs Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine diff base
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          base_sha=""
          if [[ "${EVENT_NAME}" == "push" && -n "${PUSH_BEFORE_SHA:-}" && "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${PUSH_BEFORE_SHA}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            base_sha="$(git rev-parse HEAD~1)"
          fi

          if [[ -z "${base_sha}" ]]; then
            echo "has_base=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_base=true" >> "$GITHUB_OUTPUT"
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"

      - name: Enforce deploy docs updates when deploy controls change
        if: steps.base.outputs.has_base == 'true'
        env:
          BASE_SHA: ${{ steps.base.outputs.base_sha }}
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "${BASE_SHA}" HEAD)"

          if ! printf '%s\n' "${changed_files}" | grep -Eq '^(scripts/deploy-(common|live|via-ssh|fast|prod|pull-images)\.sh|scripts/verify-deployment\.sh|scripts/rollback-last\.sh|docker-compose\.yml|\.github/workflows/deploy\.yml|\.github/workflows/deploy-preflight\.yml)$'; then
            echo "No deploy-control changes detected; docs consistency check skipped."
            exit 0
          fi

          if printf '%s\n' "${changed_files}" | grep -Eq '^(README\.md|docs/deployment-notes\.md|docs/production-deploy-checklist\.md|scripts/FAST_DEPLOY_README\.md|docs/phase4-reliability-hardening\.md|docs/deploy-incident-faq\.md)$'; then
            echo "Deploy controls changed and operational docs were updated."
            exit 0
          fi

          echo "::error::Deploy controls changed without matching docs updates. Update at least one of: README.md, docs/deployment-notes.md, docs/production-deploy-checklist.md, scripts/FAST_DEPLOY_README.md, docs/phase4-reliability-hardening.md, docs/deploy-incident-faq.md"
          exit 1

  compose-validation:
    name: Compose Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate production compose rendering
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Validate dev compose overlay rendering
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/dev/null

  backend:
    name: Backend Audit + Lint + Build + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sarkari_test?schema=public
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/sarkari_test?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sarkari_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sarkari_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit prod dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Prepare PostgreSQL schema
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Verify bundled OpenAPI spec is in sync
        run: |
          if ! diff -u ../openapi.json openapi.json; then
            echo "::error::openapi.json and backend/openapi.json are out of sync. Regenerate and commit both files."
            exit 1
          fi

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm run test:ci

  frontend:
    name: Public Frontend Audit + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit prod dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Cache Next.js frontend build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-next-frontend-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.[jt]s', 'frontend/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-next-frontend-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  admin:
    name: Admin App Audit + Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: admin-next
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit prod dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Cache Next.js admin build cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: admin-next/.next/cache
          key: ${{ runner.os }}-next-admin-${{ hashFiles('admin-next/package-lock.json') }}-${{ hashFiles('admin-next/**/*.[jt]s', 'admin-next/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-next-admin-${{ hashFiles('admin-next/package-lock.json') }}-

      - name: Lint admin app
        run: npm run lint

      - name: Build admin app
        run: npm run build

  build-images:
    name: Build and Push ${{ matrix.service }} Image
    needs: [repository-hygiene, shell-safety, deploy-doc-consistency, compose-validation, backend, frontend, admin]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
          - service: frontend
            context: frontend
          - service: admin
            context: admin-next
          - service: nginx
            context: nginx
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
            NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
          tags: |
            ghcr.io/${{ github.repository_owner }}/sarkariexam-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sarkariexam-${{ matrix.service }}:main
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
