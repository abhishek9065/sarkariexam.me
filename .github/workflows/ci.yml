name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure generated artifacts are not tracked
        run: |
          set -euo pipefail

          tracked_next="$(git ls-files | grep -E '^(frontend|admin-next)/\\.next/' || true)"
          if [[ -n "${tracked_next}" ]]; then
            echo "::error::Generated Next.js .next artifacts are tracked in git. Remove them from version control."
            echo "${tracked_next}"
            exit 1
          fi

          tracked_copilot="$(git ls-files | grep -E '^\\.copilot-artifacts/' || true)"
          if [[ -n "${tracked_copilot}" ]]; then
            echo "::error::Copilot artifact files are tracked in git. Remove .copilot-artifacts from version control."
            echo "${tracked_copilot}"
            exit 1
          fi

  compose-validation:
    name: Compose Config Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose rendering
        run: docker compose -f docker-compose.yml config >/dev/null

      - name: Validate dev compose overlay rendering
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config >/dev/null

  backend:
    name: Backend Lint + Build + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sarkari_test?schema=public
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/sarkari_test?schema=public
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sarkari_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sarkari_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare PostgreSQL schema
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Verify bundled OpenAPI spec is in sync
        run: |
          if ! diff -u ../openapi.json openapi.json; then
            echo "::error::openapi.json and backend/openapi.json are out of sync. Regenerate and commit both files."
            exit 1
          fi

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm run test:ci

  frontend:
    name: Public Frontend Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  admin:
    name: Admin App Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: admin-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint admin app
        run: npm run lint

      - name: Build admin app
        run: npm run build
