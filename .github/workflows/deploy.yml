name: Deploy to Production

on:
  workflow_run:
    workflows:
      - Production Release Validation
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:

      - name: Check deploy configuration
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Production deploy secrets are required. Configure them before running this workflow."
            exit 1
          fi

      - name: Prepare SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          validate_key() {
            chmod 600 "$1"
            ssh-keygen -y -f "$1" > /dev/null 2>&1
          }

          key_file="$HOME/.ssh/deploy_key"

          # Support raw multiline secrets, escaped newline secrets, and base64-encoded secrets.
          printf '%s\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          if ! validate_key "$key_file"; then
            printf '%b\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          fi

          if ! validate_key "$key_file"; then
            printf '%s' "$DO_SSH_KEY" | tr -d '\r\n ' | base64 -d > "$key_file" 2>/dev/null || true
          fi

          if ! validate_key "$key_file"; then
            echo "DO_SSH_KEY is not a valid private key. Save it as a raw multiline OpenSSH private key, escaped newline string, or base64-encoded private key." >&2
            exit 1
          fi

          ssh-keyscan -p "$DO_PORT" -H "$DO_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy via SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
          DEPLOY_MODE: fast
        run: |
          set -euo pipefail
          ssh_cmd=(
            ssh
            -i "$HOME/.ssh/deploy_key"
            -p "$DO_PORT"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=15
            "$DO_USER@$DO_HOST"
          )

          set +e
          "${ssh_cmd[@]}" "DEPLOY_MODE='$DEPLOY_MODE' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          candidates=(
            "$HOME/sarkari-result"
            "$HOME/sarkariexam.me"
            "/opt/sarkari-result"
            "/var/www/sarkari-result"
            "/srv/sarkari-result"
          )

          repo_dir=""
          for candidate in "${candidates[@]}"; do
            if [ -f "$candidate/scripts/deploy-live.sh" ]; then
              repo_dir="$candidate"
              break
            fi
          done

          if [ -z "$repo_dir" ]; then
            discovered="$(find "$HOME" -maxdepth 4 -type f -path '*/scripts/deploy-live.sh' 2>/dev/null | head -n 1 || true)"
            if [ -n "$discovered" ]; then
              repo_dir="$(dirname "$(dirname "$discovered")")"
            fi
          fi

          if [ -z "$repo_dir" ]; then
            echo "No deployment entrypoint found. Expected scripts/deploy-live.sh in common locations under $HOME." >&2
            exit 1
          fi

          echo "Using deployment checkout: $repo_dir"
          bash "$repo_dir/scripts/deploy-live.sh"
          REMOTE_SCRIPT
          ssh_exit=$?
          set -e

          if [ "$ssh_exit" -ne 0 ]; then
            echo "Deploy via SSH failed. Attempting to print remote deploy log tail..."
            "${ssh_cmd[@]}" "tail -n 200 /tmp/sarkari-result-deploy.log || true" || true
            exit 1
          fi
