name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    environment: production
    steps:
      - name: Check deploy configuration
        id: deploy-config
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deployment is blocked because required DigitalOcean secrets are not configured."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        if: steps.deploy-config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            set -euo pipefail
            if [ -f ~/sarkari-result/scripts/deploy-live.sh ]; then
              bash ~/sarkari-result/scripts/deploy-live.sh
            elif [ -f ~/sarkariexam.me/scripts/deploy-live.sh ]; then
              bash ~/sarkariexam.me/scripts/deploy-live.sh
            else
              echo "No deployment entrypoint found at ~/sarkari-result/scripts/deploy-live.sh or ~/sarkariexam.me/scripts/deploy-live.sh"
              exit 1
            fi
