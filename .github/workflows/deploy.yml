name: Deploy to Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:

      - name: Check deploy configuration
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Production deploy secrets are required. Configure them before running this workflow."
            exit 1
          fi

      - name: Prepare SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          validate_key() {
            chmod 600 "$1"
            ssh-keygen -y -f "$1" > /dev/null 2>&1
          }

          key_file="$HOME/.ssh/deploy_key"

          # Support raw multiline secrets, escaped newline secrets, and base64-encoded secrets.
          printf '%s\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          if ! validate_key "$key_file"; then
            printf '%b\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          fi

          if ! validate_key "$key_file"; then
            printf '%s' "$DO_SSH_KEY" | tr -d '\r\n ' | base64 -d > "$key_file" 2>/dev/null || true
          fi

          if ! validate_key "$key_file"; then
            echo "DO_SSH_KEY is not a valid private key. Save it as a raw multiline OpenSSH private key, escaped newline string, or base64-encoded private key." >&2
            exit 1
          fi

          ssh-keyscan -p "$DO_PORT" -H "$DO_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy via SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
          DO_REPO_DIR: ${{ vars.DO_REPO_DIR }}
          DEPLOY_MODE: fast
        run: |
          set -euo pipefail
          ssh_cmd=(
            ssh
            -i "$HOME/.ssh/deploy_key"
            -p "$DO_PORT"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=15
            "$DO_USER@$DO_HOST"
          )

          if ! "${ssh_cmd[@]}" "echo 'SSH preflight connected'; whoami; hostname"; then
            echo "SSH preflight failed. Check DO_HOST, DO_USER, DO_PORT, DO_SSH_KEY, and server firewall rules." >&2
            exit 1
          fi

          set +e
          "${ssh_cmd[@]}" "DEPLOY_MODE='$DEPLOY_MODE' DO_REPO_DIR='${DO_REPO_DIR:-}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          has_git_checkout() {
            local dir="$1"
            [ -d "$dir/.git" ]
          }

          has_deploy_script() {
            local dir="$1"
            [ -f "$dir/scripts/deploy-live.sh" ]
          }

          has_root_env() {
            local dir="$1"
            [ -f "$dir/.env" ]
          }

          is_ready_checkout() {
            local dir="$1"
            has_git_checkout "$dir" && has_deploy_script "$dir" && has_root_env "$dir"
          }

          is_checkout_missing_env() {
            local dir="$1"
            has_git_checkout "$dir" && has_deploy_script "$dir" && ! has_root_env "$dir"
          }

          candidates=(
            "$HOME/sarkariexam.me"
            "$HOME/sarkari-result"
            "/opt/sarkariexam.me"
            "/opt/sarkari-result"
            "/var/www/sarkariexam.me"
            "/var/www/sarkari-result"
            "/srv/sarkariexam.me"
            "/srv/sarkari-result"
          )

          canonical_repo_dir="${DO_REPO_DIR:-$HOME/sarkariexam.me}"
          bootstrap_repo_dir=""
          repo_dir=""
          missing_env_dir=""

          if [ -n "${DO_REPO_DIR:-}" ]; then
            if [ -e "$DO_REPO_DIR" ] && [ ! -d "$DO_REPO_DIR/.git" ]; then
              echo "Configured DO_REPO_DIR exists but is not a git checkout: $DO_REPO_DIR" >&2
              echo "Remove it or point DO_REPO_DIR to the production checkout path." >&2
              exit 1
            fi
            if has_git_checkout "$DO_REPO_DIR" && ! has_deploy_script "$DO_REPO_DIR"; then
              echo "Configured DO_REPO_DIR is missing scripts/deploy-live.sh: $DO_REPO_DIR" >&2
              exit 1
            fi
            if is_checkout_missing_env "$DO_REPO_DIR"; then
              echo "Deployment config missing at $DO_REPO_DIR/.env" >&2
              echo "Create $DO_REPO_DIR/.env from .env.example before rerunning deploy." >&2
              exit 1
            fi
            if is_ready_checkout "$DO_REPO_DIR"; then
              repo_dir="$DO_REPO_DIR"
            else
              bootstrap_repo_dir="$DO_REPO_DIR"
            fi
          fi

          if [ -z "$repo_dir" ]; then
            for candidate in "${candidates[@]}"; do
              if is_ready_checkout "$candidate"; then
                repo_dir="$candidate"
                break
              fi
              if [ -z "$missing_env_dir" ] && is_checkout_missing_env "$candidate"; then
                missing_env_dir="$candidate"
              fi
            done
          fi

          if [ -z "$repo_dir" ]; then
            while IFS= read -r discovered; do
              [ -z "$discovered" ] && continue
              candidate="$(dirname "$(dirname "$discovered")")"
              if is_ready_checkout "$candidate"; then
                repo_dir="$candidate"
                break
              fi
              if [ -z "$missing_env_dir" ] && is_checkout_missing_env "$candidate"; then
                missing_env_dir="$candidate"
              fi
            done < <(find "$HOME" -maxdepth 6 -type f -path '*/scripts/deploy-live.sh' 2>/dev/null | head -n 20 || true)
          fi

          if [ -z "$repo_dir" ] && [ -n "$missing_env_dir" ]; then
            echo "Deployment config missing at $missing_env_dir/.env" >&2
            echo "Create $missing_env_dir/.env from .env.example before rerunning deploy." >&2
            exit 1
          fi

          if [ -z "$repo_dir" ]; then
            repo_dir="${bootstrap_repo_dir:-$canonical_repo_dir}"
            echo "No existing deploy checkout found. Bootstrapping repository at $repo_dir"
            if [ -e "$repo_dir" ] && [ ! -d "$repo_dir/.git" ]; then
              echo "Bootstrap target exists but is not a git checkout: $repo_dir" >&2
              echo "Remove it or set DO_REPO_DIR to a clean target path." >&2
              exit 1
            fi
            if [ ! -d "$repo_dir/.git" ]; then
              mkdir -p "$(dirname "$repo_dir")"
              git clone --depth 1 https://github.com/abhishek9065/sarkariexam.me.git "$repo_dir"
            fi
          fi

          if [ ! -f "$repo_dir/scripts/deploy-live.sh" ]; then
            echo "Deployment entrypoint missing at $repo_dir/scripts/deploy-live.sh" >&2
            exit 1
          fi

          if [ ! -f "$repo_dir/.env" ]; then
            echo "Deployment config missing at $repo_dir/.env" >&2
            echo "Create $repo_dir/.env from .env.example on the deployment checkout path." >&2
            exit 1
          fi

          echo "Using deployment checkout: $repo_dir"
          REPO_DIR_OVERRIDE="$repo_dir" bash "$repo_dir/scripts/deploy-live.sh"
          REMOTE_SCRIPT
          ssh_exit=$?
          set -e

          if [ "$ssh_exit" -ne 0 ]; then
            echo "Deploy via SSH failed. Attempting to print remote deploy log tail..."
            "${ssh_cmd[@]}" "tail -n 200 /tmp/sarkari-result-deploy.log || true" || true
            exit 1
          fi
