name: Deploy to Production

on:
  workflow_run:
    workflows:
      - Main CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  gate:
    name: Evaluate Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
    steps:
      - name: Evaluate workflow_run gate
        id: gate
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          should_deploy=false

          if [[ "${TRIGGER_WORKFLOW}" == "Main CI" \
             && "${TRIGGER_CONCLUSION}" == "success" \
             && "${TRIGGER_EVENT}" == "push" \
             && "${TRIGGER_BRANCH}" == "main" \
             && "${TRIGGER_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            should_deploy=true
          fi

          echo "should_deploy=${should_deploy}" >> "$GITHUB_OUTPUT"

      - name: Summarize gate decision
        env:
          SHOULD_DEPLOY: ${{ steps.gate.outputs.should_deploy }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Production Deploy Gate"
            echo
            echo "- Workflow: ${TRIGGER_WORKFLOW}"
            echo "- Event: ${TRIGGER_EVENT}"
            echo "- Branch: ${TRIGGER_BRANCH}"
            echo "- Conclusion: ${TRIGGER_CONCLUSION}"
            echo "- Target SHA: ${TRIGGER_SHA}"
            echo "- Allowed to deploy: ${SHOULD_DEPLOY}"
            if [[ "${SHOULD_DEPLOY}" != "true" ]]; then
              echo "- Reason: deploy runs only for successful Main CI workflow_run events from pushes to main with a valid 40-character SHA."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to DigitalOcean
    needs:
      - gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Checkout target commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Run deploy helper
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DEPLOY_VARS_JSON: ${{ toJSON(vars) }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          DEPLOY_MODE: image-pull
          DEPLOY_IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          LOCK_WAIT_SECONDS: '120'
          DEPLOY_AUTOCLEAN_TRACKED: '1'
          DEPLOY_AUTOCLEAN_TRACKED_PATHS: backend/package-lock.json
        run: |
          set -euo pipefail
          DO_PORT="$(jq -r 'if .DO_PORT == null or .DO_PORT == "" then "22" else .DO_PORT end' <<<"${DEPLOY_VARS_JSON}")"
          DO_HOST_FINGERPRINT="$(jq -r '.DO_HOST_FINGERPRINT // ""' <<<"${DEPLOY_VARS_JSON}")"
          DO_REPO_DIR="$(jq -r '.DO_REPO_DIR // ""' <<<"${DEPLOY_VARS_JSON}")"
          export DO_PORT DO_HOST_FINGERPRINT DO_REPO_DIR
          bash scripts/deploy-via-ssh.sh
