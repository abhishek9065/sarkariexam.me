name: Deploy to Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: Evaluate Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.evaluate.outputs.should_deploy }}
    steps:
      - name: Evaluate workflow_run gate
        id: evaluate
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          should_deploy=false
          if [[ "${TRIGGER_WORKFLOW}" == "CI" && "${TRIGGER_CONCLUSION}" == "success" && "${TRIGGER_EVENT}" == "push" && "${TRIGGER_BRANCH}" == "main" && "${TRIGGER_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            should_deploy=true
          fi
          echo "should_deploy=${should_deploy}" >> "$GITHUB_OUTPUT"

      - name: Summarize gate decision
        env:
          SHOULD_DEPLOY: ${{ steps.evaluate.outputs.should_deploy }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Production Deploy Gate"
            echo
            echo "- Workflow: ${TRIGGER_WORKFLOW}"
            echo "- Event: ${TRIGGER_EVENT}"
            echo "- Branch: ${TRIGGER_BRANCH}"
            echo "- Conclusion: ${TRIGGER_CONCLUSION}"
            echo "- Target SHA: ${TRIGGER_SHA}"
            echo "- Allowed to deploy: ${SHOULD_DEPLOY}"
            if [[ "${SHOULD_DEPLOY}" != "true" ]]; then
              echo "- Reason: deploy only runs for successful \`CI\` workflow_run events from pushes to \`main\` with a valid 40-char target SHA."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to DigitalOcean
    needs:
      - gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    if: needs.gate.outputs.should_deploy == 'true'
    steps:
      - name: Checkout target commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Run deploy helper
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: '22'
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_EVENT: ${{ github.event.workflow_run.event }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          DEPLOY_MODE: fast
        run: bash scripts/deploy-via-ssh.sh
