name: Deploy to Production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Check deploy configuration
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Production deploy secrets are required. Configure them before running this workflow."
            exit 1
          fi

      - name: Prepare SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          validate_key() {
            chmod 600 "$1"
            ssh-keygen -y -f "$1" > /dev/null 2>&1
          }
          key_file="$HOME/.ssh/deploy_key"
          printf '%s\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          if ! validate_key "$key_file"; then
            printf '%b\n' "$DO_SSH_KEY" | tr -d '\r' > "$key_file"
          fi
          if ! validate_key "$key_file"; then
            printf '%s' "$DO_SSH_KEY" | tr -d '\r\n ' | base64 -d > "$key_file" 2>/dev/null || true
          fi
          if ! validate_key "$key_file"; then
            echo "DO_SSH_KEY is not a valid private key." >&2
            exit 1
          fi
          ssh-keyscan -p "$DO_PORT" -H "$DO_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy via SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
          DO_REPO_DIR: ${{ vars.DO_REPO_DIR }}
          DEPLOY_MODE: fast
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          ssh_cmd=(
            ssh
            -i "$HOME/.ssh/deploy_key"
            -p "$DO_PORT"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
            -o ConnectTimeout=15
            "$DO_USER@$DO_HOST"
          )
          if ! "${ssh_cmd[@]}" "echo 'SSH preflight connected'; whoami; hostname"; then
            echo "SSH preflight failed." >&2
            exit 1
          fi
          set +e
          "${ssh_cmd[@]}" "DEPLOY_MODE='$DEPLOY_MODE' DO_REPO_DIR='${DO_REPO_DIR:-}' POSTGRES_PRISMA_URL='${POSTGRES_PRISMA_URL:-}' DATABASE_URL='${DATABASE_URL:-}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          has_git_checkout() { [ -d "$1/.git" ]; }
          has_deploy_script() { [ -f "$1/scripts/deploy-live.sh" ]; }
          has_root_env() { [ -f "$1/.env" ]; }
          is_ready_checkout() { has_git_checkout "$1" && has_deploy_script "$1" && has_root_env "$1"; }
          is_checkout_missing_env() { has_git_checkout "$1" && has_deploy_script "$1" && ! has_root_env "$1"; }
          candidates=(
            "$HOME/sarkariexam.me" "$HOME/sarkari-result"
            "/opt/sarkariexam.me" "/opt/sarkari-result"
            "/var/www/sarkariexam.me" "/var/www/sarkari-result"
            "/srv/sarkariexam.me" "/srv/sarkari-result"
          )
          canonical_repo_dir="${DO_REPO_DIR:-$HOME/sarkariexam.me}"
          repo_dir=""
          missing_env_dir=""
          bootstrap_repo_dir=""
          if [ -n "${DO_REPO_DIR:-}" ]; then
            if is_ready_checkout "$DO_REPO_DIR"; then
              repo_dir="$DO_REPO_DIR"
            elif is_checkout_missing_env "$DO_REPO_DIR"; then
              repo_dir="$DO_REPO_DIR"
              missing_env_dir="$DO_REPO_DIR"
            elif [ ! -e "$DO_REPO_DIR" ] || [ -d "$DO_REPO_DIR/.git" ]; then
              bootstrap_repo_dir="$DO_REPO_DIR"
            fi
          fi
          if [ -z "$repo_dir" ]; then
            for candidate in "${candidates[@]}"; do
              if is_ready_checkout "$candidate"; then
                repo_dir="$candidate"; break
              elif [ -z "$missing_env_dir" ] && is_checkout_missing_env "$candidate"; then
                missing_env_dir="$candidate"; repo_dir="$candidate"
              fi
            done
          fi
          if [ -z "$repo_dir" ]; then
            while IFS= read -r discovered; do
              [ -z "$discovered" ] && continue
              candidate="$(dirname "$(dirname "$discovered")")"  
              if is_ready_checkout "$candidate"; then
                repo_dir="$candidate"; break
              elif [ -z "$missing_env_dir" ] && is_checkout_missing_env "$candidate"; then
                missing_env_dir="$candidate"; repo_dir="$candidate"
              fi
            done < <(find "$HOME" -maxdepth 6 -type f -path '*/scripts/deploy-live.sh' 2>/dev/null | head -n 20 || true)
          fi
          if [ -z "$repo_dir" ]; then
            repo_dir="${bootstrap_repo_dir:-$canonical_repo_dir}"
            echo "No existing checkout found. Bootstrapping at $repo_dir"
            if [ -e "$repo_dir" ] && [ ! -d "$repo_dir/.git" ]; then
              repo_dir="$HOME/sarkariexam.me"
            fi
            if [ ! -d "$repo_dir/.git" ]; then
              mkdir -p "$(dirname "$repo_dir")"
              git clone --depth 1 https://github.com/abhishek9065/sarkariexam.me.git "$repo_dir"
            fi
          fi
          if [ ! -f "$repo_dir/scripts/deploy-live.sh" ]; then
            echo "Deployment entrypoint missing at $repo_dir/scripts/deploy-live.sh" >&2; exit 1
          fi
          sync_checkout_to_main() {
            git -C "$1" config --global --add safe.directory "$1" >/dev/null 2>&1 || true
            git -C "$1" -c safe.directory="$1" fetch origin main
            git -C "$1" -c safe.directory="$1" checkout main
            git -C "$1" -c safe.directory="$1" pull --ff-only origin main
          }
          if ! sync_checkout_to_main "$repo_dir"; then
            echo "NOTICE: fast-forward failed, trying fresh clone."
            fallback_repo_dir="${repo_dir}.fresh.$$"
            rm -rf "$fallback_repo_dir"
            git clone --depth 1 https://github.com/abhishek9065/sarkariexam.me.git "$fallback_repo_dir"
            if [ -f "$repo_dir/.env" ] && [ ! -f "$fallback_repo_dir/.env" ]; then
              cp "$repo_dir/.env" "$fallback_repo_dir/.env"
            fi
            repo_dir="$fallback_repo_dir"
          fi
          # Ensure .env exists; create from GitHub Secrets if missing
          if [ ! -f "$repo_dir/.env" ]; then
            echo "NOTICE: .env not found -- creating from GitHub Secrets."
            touch "$repo_dir/.env"
          fi
          # Upsert POSTGRES_PRISMA_URL from GitHub Secret
          if [ -n "${POSTGRES_PRISMA_URL:-}" ]; then
            if grep -q "^POSTGRES_PRISMA_URL=" "$repo_dir/.env"; then
              sed -i "s|^POSTGRES_PRISMA_URL=.*|POSTGRES_PRISMA_URL=\"${POSTGRES_PRISMA_URL}\"|" "$repo_dir/.env"
            else
              echo "POSTGRES_PRISMA_URL=\"${POSTGRES_PRISMA_URL}\"" >> "$repo_dir/.env"
            fi
            echo "Injected POSTGRES_PRISMA_URL into $repo_dir/.env"
          fi
          # Upsert DATABASE_URL from GitHub Secret
          if [ -n "${DATABASE_URL:-}" ]; then
            if grep -q "^DATABASE_URL=" "$repo_dir/.env"; then
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=\"${DATABASE_URL}\"|" "$repo_dir/.env"
            else
              echo "DATABASE_URL=\"${DATABASE_URL}\"" >> "$repo_dir/.env"
            fi
            echo "Injected DATABASE_URL into $repo_dir/.env"
          fi
          echo "Using deployment checkout: $repo_dir"
          POSTGRES_PRISMA_URL="${POSTGRES_PRISMA_URL:-}" DATABASE_URL="${DATABASE_URL:-}" REPO_DIR_OVERRIDE="$repo_dir" bash "$repo_dir/scripts/deploy-live.sh"
          REMOTE_SCRIPT
          ssh_exit=$?
          set -e
          if [ "$ssh_exit" -ne 0 ]; then
            echo "Deploy via SSH failed. Attempting to print remote deploy log tail..."
            "${ssh_cmd[@]}" "tail -n 200 /tmp/sarkari-result-deploy.log || true" || true
            exit 1
          fi
