name: Deploy to Production

on:
  workflow_run:
    workflows:
      - Production Release Validation
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Deployment mode
        type: choice
        options:
          - fast
          - full
        default: fast

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')
    steps:
      - name: Resolve deployment inputs
        id: deploy-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_DEPLOY_MODE: ${{ inputs.deploy_mode }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "deploy_mode=fast" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          deploy_mode="${DISPATCH_DEPLOY_MODE:-fast}"

          echo "deploy_mode=$deploy_mode" >> "$GITHUB_OUTPUT"

      - name: Check deploy configuration
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Production deploy secrets are required. Configure them before running this workflow."
            exit 1
          fi

      - name: Prepare SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DO_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null
          ssh-keyscan -p "$DO_PORT" -H "$DO_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy via SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_PORT: ${{ secrets.DO_PORT || 22 }}
          DEPLOY_MODE: ${{ steps.deploy-inputs.outputs.deploy_mode }}
        run: |
          set -euo pipefail
          ssh \
            -i "$HOME/.ssh/deploy_key" \
            -p "$DO_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "$DO_USER@$DO_HOST" \
            "DEPLOY_MODE='$DEPLOY_MODE' bash -lc 'set -euo pipefail; if [ -f ~/sarkari-result/scripts/deploy-live.sh ]; then bash ~/sarkari-result/scripts/deploy-live.sh; elif [ -f ~/sarkariexam.me/scripts/deploy-live.sh ]; then bash ~/sarkariexam.me/scripts/deploy-live.sh; else echo \"No deployment entrypoint found at ~/sarkari-result/scripts/deploy-live.sh or ~/sarkariexam.me/scripts/deploy-live.sh\"; exit 1; fi'"
