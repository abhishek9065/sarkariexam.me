name: Deploy to Production

on:
  workflow_run:
    workflows:
      - Build and Publish Production Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Deployment mode
        type: choice
        options:
          - fast
          - full
        default: fast
      image_tag:
        description: Image tag to deploy. Leave blank to deploy the stable main tag.
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: production
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Resolve deployment inputs
        id: deploy-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_DEPLOY_MODE: ${{ inputs.deploy_mode }}
          DISPATCH_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "deploy_mode=fast" >> "$GITHUB_OUTPUT"
            echo "image_tag=$WORKFLOW_RUN_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          deploy_mode="${DISPATCH_DEPLOY_MODE:-fast}"
          image_tag="${DISPATCH_IMAGE_TAG:-main}"

          echo "deploy_mode=$deploy_mode" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Check deploy configuration
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          missing=0
          for key in DO_HOST DO_USER DO_SSH_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Production deploy secrets are required. Configure them before running this workflow."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script: |
            set -euo pipefail
            export DEPLOY_MODE='${{ steps.deploy-inputs.outputs.deploy_mode }}'
            export DEPLOY_IMAGE_TAG='${{ steps.deploy-inputs.outputs.image_tag }}'
            export DEPLOY_IMAGE_FALLBACK_TAG='main'
            if [ -f ~/sarkari-result/scripts/deploy-live.sh ]; then
              bash ~/sarkari-result/scripts/deploy-live.sh
            elif [ -f ~/sarkariexam.me/scripts/deploy-live.sh ]; then
              bash ~/sarkariexam.me/scripts/deploy-live.sh
            else
              echo "No deployment entrypoint found at ~/sarkari-result/scripts/deploy-live.sh or ~/sarkariexam.me/scripts/deploy-live.sh"
              exit 1
            fi
