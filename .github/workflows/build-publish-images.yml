name: Build and Publish Production Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  validate-production-ref:
    name: Validate Production Ref
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs only for main
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production image publishing via manual dispatch is allowed only from the main branch."
            echo "Current ref: $GITHUB_REF"
            exit 1
          fi

  ci:
    name: CI
    needs:
      - validate-production-ref
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  security:
    name: Security
    needs:
      - validate-production-ref
    uses: ./.github/workflows/security.yml
    secrets: inherit

  publish-images:
    name: Publish ${{ matrix.service }} Image
    needs:
      - ci
      - security
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: sarkari-result-frontend
          - service: admin
            context: ./admin-next
            dockerfile: ./admin-next/Dockerfile
            image_name: sarkari-result-admin
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: sarkari-result-backend
          - service: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
            image_name: sarkari-result-nginx
    env:
      IMAGE_REGISTRY: registry.digitalocean.com/${{ secrets.DOCR_REGISTRY_NAME }}
    steps:
      - name: Check registry configuration
        env:
          DOCR_REGISTRY_NAME: ${{ secrets.DOCR_REGISTRY_NAME }}
          DOCR_TOKEN: ${{ secrets.DOCR_TOKEN }}
        run: |
          missing=0
          for key in DOCR_REGISTRY_NAME DOCR_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "DigitalOcean Container Registry secrets are required for production image publishing."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and push frontend image
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://sarkariexams.me/api
            NEXT_PUBLIC_ADMIN_URL=https://sarkariexams.me/admin
          platforms: linux/amd64
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:main
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:buildcache,mode=max

      - name: Build and push image
        if: matrix.service != 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:main
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:buildcache,mode=max
