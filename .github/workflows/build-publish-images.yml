name: Production Release Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  validate-production-ref:
    name: Validate Production Ref
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs only for main
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production image publishing via manual dispatch is allowed only from the main branch."
            echo "Current ref: $GITHUB_REF"
            exit 1
          fi

  ci:
    name: CI
    needs:
      - validate-production-ref
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  security:
    name: Security
    needs:
      - validate-production-ref
    uses: ./.github/workflows/security.yml
    secrets: inherit

  release-ready:
    name: Release Ready
    needs:
      - ci
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as deployable
        run: |
          echo "CI and security checks passed. Production deploy can proceed from the GitHub Actions SSH workflow."
