name: Deploy Preflight

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment containing DO_* deploy variables/secrets
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      target_sha:
        description: 40-character commit SHA to validate remotely
        required: true
        type: string
      deploy_mode:
        description: Compose deploy mode to preflight
        required: true
        type: choice
        options:
          - image-pull
          - fast
          - full
        default: fast

permissions:
  contents: read

concurrency:
  group: deploy-preflight-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Remote Deploy Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Validate target SHA format
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          if [[ ! "${TARGET_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::target_sha must be a full 40-character commit SHA"
            exit 1
          fi

      - name: Checkout target commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.target_sha }}
          persist-credentials: false

      - name: Run remote preflight only
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
          DEPLOY_VARS_JSON: ${{ toJSON(vars) }}
          TRIGGER_SHA: ${{ inputs.target_sha }}
          TRIGGER_BRANCH: manual/${{ inputs.target_environment }}
          TRIGGER_EVENT: workflow_dispatch
          TRIGGER_CONCLUSION: preflight-only
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          DEPLOY_IMAGE_TAG: ${{ inputs.target_sha }}
          DEPLOY_PREFLIGHT_ONLY: '1'
          DEPLOY_AUTOCLEAN_TRACKED: '1'
          DEPLOY_AUTOCLEAN_TRACKED_PATHS: backend/package-lock.json
        run: |
          set -euo pipefail
          DO_PORT="$(jq -r 'if .DO_PORT == null or .DO_PORT == "" then "22" else .DO_PORT end' <<<"${DEPLOY_VARS_JSON}")"
          DO_HOST_FINGERPRINT="$(jq -r '.DO_HOST_FINGERPRINT // ""' <<<"${DEPLOY_VARS_JSON}")"
          DO_REPO_DIR="$(jq -r '.DO_REPO_DIR // ""' <<<"${DEPLOY_VARS_JSON}")"
          export DO_PORT DO_HOST_FINGERPRINT DO_REPO_DIR
          bash scripts/deploy-via-ssh.sh
